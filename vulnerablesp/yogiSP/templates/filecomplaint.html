{% extends "base.html" %}

{% block content %}
<div class="page-header">
  <div class="icon" style="background: var(--warning-light); color: var(--warning);">
    <i class="bi bi-pencil-square"></i>
  </div>
  <h3>File a Complaint</h3>
</div>
<p class="text-muted mb-4">Please fill out the form below to report Yogi's misbehavior.</p>

<div class="card">
  <div class="card-body px-4 py-4">
    <form action="/newcomplaint" method="post">
      <div class="row g-3" style="max-width: 600px;">
        <div class="col-12">
          <label for="complaintDescription" class="form-label text-muted">Complaint Description</label>
          <input type="text" class="form-control" id="complaintDescription" name="complaintDescription" placeholder="Describe the incident..." required />
        </div>
        <div class="col-md-6">
          <label for="severity" class="form-label text-muted">Severity</label>
          <input type="text" class="form-control" id="severity" name="severity" placeholder="e.g. Low, Medium, High" required />
        </div>
        <div class="col-md-6">
          <label for="victim" class="form-label text-muted">Victim</label>
          <input type="text" class="form-control" id="victim" name="victim" placeholder="Who was affected?" required />
        </div>
        <div class="col-12 mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-accent"><i class="bi bi-send me-2"></i>File Complaint</button>
          <a href="/complaints" class="btn btn-outline-accent">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>

{% endblock %}
